name: Build and Push Docker Image

on:
  push:
    branches: [personal]
  # Allows you to run workflow manually from Actions tab
  workflow_dispatch:
    inputs:
      tags:
        description: "Docker Tag"
        required: false
        default: 'personal'

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, 'skip ci') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out audiobookshelf server
        uses: actions/checkout@v6
        with:
          repository: vito0912/audiobookshelf
          ref: personal
          path: .

      - name: Check out React client
        uses: actions/checkout@v6
        with:
          path: client-react

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/audiobookshelf-react
          tags: |
            type=sha,prefix=
            type=raw,value=personal

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply dual-client patch to audiobookshelf server
        run: git apply client-react/dual-client-port.patch

      - name: Copy Dockerfile from React client
        run: cp client-react/Dockerfile ./Dockerfile

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          context: .
          platforms: linux/amd64
          push: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
